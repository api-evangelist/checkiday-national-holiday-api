naftiko: 1.0.0-alpha2
info:
  label: Checkiday Holiday Lookup
  description: |
    Look up holidays and observances for any date — single-day events,
    multi-day events that start on that date, and multi-day events that are
    continuing their observance. Self-contained Naftiko capability that
    consumes the Checkiday Holiday and Event API routed through apilayer.
  tags:
    - Checkiday
    - Holidays
    - Calendar
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
  - namespace: env
    keys:
      CHECKIDAY_API_KEY: CHECKIDAY_API_KEY
capability:
  consumes:
    - type: http
      namespace: checkiday-holiday-lookup
      baseUri: https://api.apilayer.com/checkiday
      description: Checkiday Holiday Lookup business capability. Consumes the public /events endpoint.
      resources:
        - name: events
          path: /events
          operations:
            - name: getevents
              method: GET
              description: Get all holidays for a specified date.
              outputRawFormat: json
              inputParameters:
                - name: date
                  in: query
                  type: string
                  required: false
                - name: timezone
                  in: query
                  type: string
                  required: false
                - name: adult
                  in: query
                  type: boolean
                  required: false
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: apiKey
        in: header
        name: apikey
        value: '{{env.CHECKIDAY_API_KEY}}'
  exposes:
    - type: rest
      namespace: checkiday-holiday-lookup-rest
      port: 8080
      description: REST adapter for the Checkiday Holiday Lookup capability. One Spectral-compliant resource per consumed operation, prefixed with /v1.
      resources:
        - path: /v1/events
          name: events
          description: REST surface for date-based event lookup.
          operations:
            - method: GET
              name: getevents
              description: Get Events For Date
              call: checkiday-holiday-lookup.getevents
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: checkiday-holiday-lookup-mcp
      port: 9090
      transport: http
      description: MCP adapter for the Checkiday Holiday Lookup capability. One tool per consumed operation.
      tools:
        - name: get-events
          description: Get all holidays and observances for a specified date.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: checkiday-holiday-lookup.getevents
          outputParameters:
            - type: object
              mapping: $.
