naftiko: 1.0.0-alpha2
info:
  label: Checkiday Event Discovery
  description: |
    Discover and inspect individual holidays — search across the catalog by
    keyword, then retrieve full details for any matching event, including
    descriptions, hashtags, images, founders, observance patterns, and
    multi-year occurrence schedules. Self-contained capability that consumes
    the Checkiday `/search` and `/event` endpoints.
  tags:
    - Checkiday
    - Holidays
    - Search
    - Discovery
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
  - namespace: env
    keys:
      CHECKIDAY_API_KEY: CHECKIDAY_API_KEY
capability:
  consumes:
    - type: http
      namespace: checkiday-event-discovery
      baseUri: https://api.apilayer.com/checkiday
      description: Checkiday Event Discovery business capability. Consumes /search and /event.
      resources:
        - name: search
          path: /search
          operations:
            - name: searchevents
              method: GET
              description: Full-text search across holidays and observances.
              outputRawFormat: json
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: true
                  minLength: 3
                - name: adult
                  in: query
                  type: boolean
                  required: false
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: event
          path: /event
          operations:
            - name: geteventinfo
              method: GET
              description: Get full information for an Event by id.
              outputRawFormat: json
              inputParameters:
                - name: id
                  in: query
                  type: string
                  required: true
                - name: start
                  in: query
                  type: integer
                  required: false
                - name: end
                  in: query
                  type: integer
                  required: false
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: apiKey
        in: header
        name: apikey
        value: '{{env.CHECKIDAY_API_KEY}}'
  exposes:
    - type: rest
      namespace: checkiday-event-discovery-rest
      port: 8080
      description: REST adapter for the Checkiday Event Discovery capability.
      resources:
        - path: /v1/search
          name: search
          description: REST surface for event search.
          operations:
            - method: GET
              name: searchevents
              description: Search Events
              call: checkiday-event-discovery.searchevents
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/event
          name: event
          description: REST surface for event detail.
          operations:
            - method: GET
              name: geteventinfo
              description: Get Event By Id
              call: checkiday-event-discovery.geteventinfo
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: checkiday-event-discovery-mcp
      port: 9090
      transport: http
      description: MCP adapter for the Checkiday Event Discovery capability.
      tools:
        - name: search-events
          description: Search for holidays and observances by keyword.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: checkiday-event-discovery.searchevents
          outputParameters:
            - type: object
              mapping: $.
        - name: get-event-info
          description: Retrieve full information for a holiday by id, with optional year range for occurrences.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: checkiday-event-discovery.geteventinfo
          outputParameters:
            - type: object
              mapping: $.
