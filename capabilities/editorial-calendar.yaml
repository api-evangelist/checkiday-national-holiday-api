naftiko: 1.0.0-alpha2
info:
  label: Checkiday Editorial Calendar
  description: |
    Editorial calendar workflow capability for newsrooms, marketers, and
    social-media platforms. Composes Checkiday's date listing, search, and
    detail endpoints to build holiday-driven publishing schedules — pull
    today's events, drill into the ones that match an editorial theme via
    search, then enrich the chosen story with full descriptions, founders,
    images, and hashtags.
  tags:
    - Checkiday
    - Editorial
    - Marketing
    - Social Media
    - Workflow
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
  - namespace: env
    keys:
      CHECKIDAY_API_KEY: CHECKIDAY_API_KEY
capability:
  consumes:
    - type: http
      namespace: checkiday-editorial
      baseUri: https://api.apilayer.com/checkiday
      description: Composite editorial workflow — chains /events, /search, and /event.
      resources:
        - name: events
          path: /events
          operations:
            - name: getevents
              method: GET
              description: Pull all events for the editorial date.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: search
          path: /search
          operations:
            - name: searchevents
              method: GET
              description: Search for events matching an editorial theme.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: event
          path: /event
          operations:
            - name: geteventinfo
              method: GET
              description: Enrich the chosen event with full descriptions, founders, and images.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: apiKey
        in: header
        name: apikey
        value: '{{env.CHECKIDAY_API_KEY}}'
  exposes:
    - type: rest
      namespace: checkiday-editorial-rest
      port: 8080
      description: REST adapter exposing the editorial workflow composition.
      resources:
        - path: /v1/editorial/today
          name: today
          description: Get today's events for the editorial calendar.
          operations:
            - method: GET
              name: getevents
              description: Get Editorial Calendar For Today
              call: checkiday-editorial.getevents
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/editorial/search
          name: editorial-search
          description: Search the editorial catalog for themed events.
          operations:
            - method: GET
              name: searchevents
              description: Search Editorial Themes
              call: checkiday-editorial.searchevents
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/editorial/event
          name: editorial-event
          description: Enrich a single editorial event.
          operations:
            - method: GET
              name: geteventinfo
              description: Enrich Editorial Event
              call: checkiday-editorial.geteventinfo
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: checkiday-editorial-mcp
      port: 9090
      transport: http
      description: MCP adapter exposing the editorial workflow as tools an LLM can chain together.
      tools:
        - name: editorial-today
          description: Get today's holidays and observances for editorial planning.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: checkiday-editorial.getevents
          outputParameters:
            - type: object
              mapping: $.
        - name: editorial-search
          description: Search the holiday catalog for themed events.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: checkiday-editorial.searchevents
          outputParameters:
            - type: object
              mapping: $.
        - name: editorial-enrich
          description: Pull full descriptions, founders, images, and hashtags for a chosen event.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: checkiday-editorial.geteventinfo
          outputParameters:
            - type: object
              mapping: $.
